<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娜家视觉 - AI产品图工作流</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sidebar-bg: #ffffff;
            --sidebar-text: #1d1d1f;
            --sidebar-text-sec: #86868b;
            --sidebar-hover: #f5f5f7;
            --sidebar-active: #f0f0f2;
            --border: #e5e5e5;
            --accent-blue: rgba(102,126,234,.12);
            --accent-purple: rgba(118,75,162,.12);
            --accent-green: rgba(52,199,89,.12);
            --accent-orange: rgba(255,149,0,.12);
            --accent-teal: rgba(90,200,200,.12);
            --accent-pink: rgba(255,100,130,.12);
        }
        body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; overflow: hidden; background: #f5f5f7; }

        .layout { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 240px; min-width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .sidebar-brand {
            padding: 20px 18px 16px;
            border-bottom: 1px solid var(--border);
        }
        .brand-row {
            display: flex; align-items: center; gap: 10px;
        }
        .brand-logo {
            width: 36px; height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: #000;
        }
        .brand-logo img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .brand-name {
            color: var(--sidebar-text);
            font-weight: 600; font-size: 15px;
            line-height: 1.2;
        }
        .brand-sub {
            color: var(--sidebar-text-sec);
            font-size: 11px; margin-top: 2px;
        }

        .sidebar-nav {
            flex: 1; padding: 8px 10px;
            display: flex; flex-direction: column; gap: 2px;
            overflow-y: auto;
        }
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }

        .nav-section {
            font-size: 10px; font-weight: 600;
            color: var(--sidebar-text-sec);
            letter-spacing: 1.5px;
            padding: 14px 10px 6px;
            text-transform: uppercase;
            display: flex; align-items: center; gap: 6px;
        }
        .nav-section-icon { font-size: 12px; }

        .nav-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            border-radius: 9px;
            cursor: pointer;
            transition: all .15s;
            border: none; background: none;
            width: 100%; text-align: left;
            font-family: inherit;
        }
        .nav-btn:hover { background: var(--sidebar-hover); }
        .nav-btn.active { background: var(--sidebar-active); }
        .nav-ico {
            width: 30px; height: 30px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .nav-ico-kuociq { background: var(--accent-blue); }
        .nav-ico-scene { background: var(--accent-purple); }
        .nav-ico-fusion { background: var(--accent-green); }
        .nav-ico-tutorial { background: var(--accent-orange); }
        .nav-ico-ps { background: var(--accent-teal); }
        .nav-ico-api { background: var(--accent-pink); }
        .nav-ico-checklist { background: var(--accent-orange); }
        .nav-ico-faq { background: var(--accent-blue); }

        .nav-btn.active .nav-ico-kuociq { background: rgba(102,126,234,.22); }
        .nav-btn.active .nav-ico-scene { background: rgba(118,75,162,.22); }
        .nav-btn.active .nav-ico-fusion { background: rgba(52,199,89,.22); }

        .nav-info { flex: 1; min-width: 0; }
        .nav-title {
            color: var(--sidebar-text);
            font-size: 13px; font-weight: 500;
            line-height: 1.3;
        }
        .nav-btn.active .nav-title { font-weight: 600; }
        .nav-desc {
            color: var(--sidebar-text-sec);
            font-size: 11px; margin-top: 1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .nav-ext {
            font-size: 12px; color: var(--sidebar-text-sec);
            flex-shrink: 0; opacity: .5;
        }

        .sidebar-footer {
            padding: 14px 18px;
            border-top: 1px solid var(--border);
            color: var(--sidebar-text-sec);
            font-size: 11px;
            text-align: center;
        }

        /* Content */
        .content {
            flex: 1; position: relative;
            background: #f5f5f7;
        }
        .content iframe {
            width: 100%; height: 100%;
            border: none;
            display: block;
        }

        /* Welcome page */
        .welcome {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; text-align: center;
            padding: 40px;
        }
        .welcome-logo {
            width: 80px; height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: #000;
            margin-bottom: 24px;
        }
        .welcome-logo img { width: 100%; height: 100%; object-fit: cover; }
        .welcome h1 {
            font-size: 28px; font-weight: 700;
            color: var(--sidebar-text);
            margin-bottom: 8px;
        }
        .welcome p {
            font-size: 15px; color: var(--sidebar-text-sec);
            max-width: 480px; line-height: 1.7;
        }
        .welcome-hint {
            margin-top: 32px;
            font-size: 13px; color: var(--sidebar-text-sec);
            opacity: .7;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 64px; min-width: 64px; }
            .brand-row { justify-content: center; }
            .brand-name, .brand-sub, .nav-info, .nav-section, .sidebar-footer, .nav-ext { display: none; }
            .nav-btn { justify-content: center; padding: 11px 8px; }
            .sidebar-brand { padding: 16px 8px 12px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-row">
                <div class="brand-logo"><img src="logo.jpg" alt="NQ"></div>
                <div>
                    <div class="brand-name">娜家视觉</div>
                    <div class="brand-sub">AI产品图工作流</div>
                </div>
            </div>
        </div>

        <div class="sidebar-nav">
            <!-- 智能体工具 -->
            <div class="nav-section">
                <span class="nav-section-icon">🔧</span> 智能体工具
            </div>

            <button class="nav-btn" id="navKuociq" onclick="switchTool('kuociq')">
                <div class="nav-ico nav-ico-kuociq">💡</div>
                <div class="nav-info">
                    <div class="nav-title">扩词器</div>
                    <div class="nav-desc">产品信息→专业生图提示词</div>
                </div>
            </button>

            <button class="nav-btn" id="navScene" onclick="switchTool('scene')">
                <div class="nav-ico nav-ico-scene">🎨</div>
                <div class="nav-info">
                    <div class="nav-title">AI创意生图</div>
                    <div class="nav-desc">上传产品+参考，一步生成场景图</div>
                </div>
            </button>

            <button class="nav-btn" id="navFusion" onclick="switchTool('fusion')">
                <div class="nav-ico nav-ico-fusion">🔗</div>
                <div class="nav-info">
                    <div class="nav-title">实拍融合AI</div>
                    <div class="nav-desc">实拍产品+AI场景融合</div>
                </div>
            </button>

            <!-- 知识库 -->
            <div class="nav-section">
                <span class="nav-section-icon">📚</span> 知识库
            </div>

            <a class="nav-btn" href="#" id="navTutorial" target="_blank" rel="noopener">
                <div class="nav-ico nav-ico-tutorial">📖</div>
                <div class="nav-info">
                    <div class="nav-title">AI出图教程</div>
                    <div class="nav-desc">从白底图到商用场景图</div>
                </div>
                <span class="nav-ext">↗</span>
            </a>

            <a class="nav-btn" href="#" id="navPs" target="_blank" rel="noopener">
                <div class="nav-ico nav-ico-ps">🖼️</div>
                <div class="nav-info">
                    <div class="nav-title">PS合成教程</div>
                    <div class="nav-desc">AI图不够用？PS精修补救</div>
                </div>
                <span class="nav-ext">↗</span>
            </a>

            <a class="nav-btn" href="#" id="navApi" target="_blank" rel="noopener">
                <div class="nav-ico nav-ico-api">⚙️</div>
                <div class="nav-info">
                    <div class="nav-title">API配置指南</div>
                    <div class="nav-desc">注册火山引擎&配置密钥</div>
                </div>
                <span class="nav-ext">↗</span>
            </a>

            <!-- 资源 -->
            <div class="nav-section">
                <span class="nav-section-icon">📋</span> 资源
            </div>

            <a class="nav-btn" href="#" id="navChecklist" target="_blank" rel="noopener">
                <div class="nav-ico nav-ico-checklist">✅</div>
                <div class="nav-info">
                    <div class="nav-title">商用图标准自查</div>
                    <div class="nav-desc">你的产品图能上架吗？</div>
                </div>
                <span class="nav-ext">↗</span>
            </a>

            <a class="nav-btn" href="#" id="navFaq" target="_blank" rel="noopener">
                <div class="nav-ico nav-ico-faq">❓</div>
                <div class="nav-info">
                    <div class="nav-title">常见问题</div>
                    <div class="nav-desc">使用问题快速解答</div>
                </div>
                <span class="nav-ext">↗</span>
            </a>
        </div>

        <div class="sidebar-footer">© 娜家视觉</div>
    </div>

    <div class="content">
        <div class="welcome" id="welcomePage">
            <div class="welcome-logo"><img src="logo.jpg" alt="NQ"></div>
            <h1>娜家视觉</h1>
            <p>AI产品图工作流——从白底图到商用场景图，<br>智能体工具 + 专业知识库，一站式搞定。</p>
            <div class="welcome-hint">← 选择左侧工具开始使用</div>
        </div>
        <iframe id="toolFrame" src="" style="display:none;"></iframe>
    </div>
</div>

<script>
const tools = {
    kuociq: { url: 'kuociq.html', navId: 'navKuociq' },
    scene:  { url: 'scene-gen.html', navId: 'navScene' },
    fusion: { url: 'fusion-pro.html', navId: 'navFusion' }
};
let currentTool = null;

function switchTool(name) {
    if (name === currentTool) return;
    currentTool = name;
    const frame = document.getElementById('toolFrame');
    const welcome = document.getElementById('welcomePage');
    frame.src = tools[name].url;
    frame.style.display = 'block';
    welcome.style.display = 'none';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tools[name].navId).classList.add('active');
}
</script>
</body>
</html>
