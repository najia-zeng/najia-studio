<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娜家工作室 - AI产品图工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sidebar-bg: #1d1d1f;
            --sidebar-text: #f5f5f7;
            --sidebar-text-sec: #86868b;
            --sidebar-hover: #2d2d2f;
            --sidebar-active: #3a3a3c;
            --border: #e5e5e5;
        }
        body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; overflow: hidden; background: #f5f5f7; }

        .layout { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 220px; min-width: 220px;
            background: var(--sidebar-bg);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .sidebar-brand {
            padding: 20px 18px 16px;
            border-bottom: 1px solid rgba(255,255,255,.08);
        }
        .brand-row {
            display: flex; align-items: center; gap: 10px;
        }
        .brand-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 18px;
            flex-shrink: 0;
        }
        .brand-name {
            color: var(--sidebar-text);
            font-weight: 600; font-size: 16px;
            line-height: 1.2;
        }
        .brand-sub {
            color: var(--sidebar-text-sec);
            font-size: 11px; margin-top: 2px;
        }

        .sidebar-nav {
            flex: 1; padding: 12px 10px;
            display: flex; flex-direction: column; gap: 4px;
            overflow-y: auto;
        }
        .nav-section {
            font-size: 10px; font-weight: 600;
            color: var(--sidebar-text-sec);
            letter-spacing: 1.5px;
            padding: 16px 10px 6px;
            text-transform: uppercase;
        }
        .nav-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 12px;
            border-radius: 9px;
            cursor: pointer;
            transition: all .15s;
            border: none; background: none;
            width: 100%; text-align: left;
            font-family: inherit;
        }
        .nav-btn:hover { background: var(--sidebar-hover); }
        .nav-btn.active { background: var(--sidebar-active); }
        .nav-ico {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .nav-ico-scene { background: rgba(102,126,234,.2); }
        .nav-ico-fusion { background: rgba(118,75,162,.2); }
        .nav-btn.active .nav-ico-scene { background: rgba(102,126,234,.35); }
        .nav-btn.active .nav-ico-fusion { background: rgba(118,75,162,.35); }
        .nav-info { flex: 1; min-width: 0; }
        .nav-title {
            color: var(--sidebar-text);
            font-size: 13px; font-weight: 500;
            line-height: 1.3;
        }
        .nav-desc {
            color: var(--sidebar-text-sec);
            font-size: 11px; margin-top: 1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .sidebar-footer {
            padding: 14px 18px;
            border-top: 1px solid rgba(255,255,255,.08);
            color: var(--sidebar-text-sec);
            font-size: 11px;
            text-align: center;
        }

        /* Content */
        .content {
            flex: 1; position: relative;
            background: #f5f5f7;
        }
        .content iframe {
            width: 100%; height: 100%;
            border: none;
            display: block;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 64px; min-width: 64px; }
            .brand-row { justify-content: center; }
            .brand-name, .brand-sub, .nav-info, .nav-section, .sidebar-footer { display: none; }
            .nav-btn { justify-content: center; padding: 11px 8px; }
            .sidebar-brand { padding: 16px 8px 12px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-row">
                <div class="brand-logo">娜</div>
                <div>
                    <div class="brand-name">娜家工作室</div>
                    <div class="brand-sub">AI产品图工具</div>
                </div>
            </div>
        </div>

        <div class="sidebar-nav">
            <div class="nav-section">工具</div>

            <button class="nav-btn active" id="navScene" onclick="switchTool('scene')">
                <div class="nav-ico nav-ico-scene">🎨</div>
                <div class="nav-info">
                    <div class="nav-title">场景生图</div>
                    <div class="nav-desc">上传产品+参考，生成场景图</div>
                </div>
            </button>

            <button class="nav-btn" id="navFusion" onclick="switchTool('fusion')">
                <div class="nav-ico nav-ico-fusion">🔗</div>
                <div class="nav-info">
                    <div class="nav-title">贴图融合</div>
                    <div class="nav-desc">拖拽产品到背景，AI融合</div>
                </div>
            </button>
        </div>

        <div class="sidebar-footer">© 娜家工作室</div>
    </div>

    <div class="content">
        <iframe id="toolFrame" src="scene-gen.html"></iframe>
    </div>
</div>

<script>
const tools = {
    scene: { url: 'scene-gen.html', navId: 'navScene' },
    fusion: { url: 'fusion-pro.html', navId: 'navFusion' }
};
let currentTool = 'scene';

function switchTool(name) {
    if (name === currentTool) return;
    currentTool = name;
    document.getElementById('toolFrame').src = tools[name].url;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tools[name].navId).classList.add('active');
}
</script>
</body>
</html>
