<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影融合 - AI产品场景融合</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --border: #e5e5e5;
            --text: #1d1d1f;
            --text-sec: #86868b;
            --accent: #1d1d1f;
            --accent-h: #333;
            --radius: 14px;
            --radius-s: 10px;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .page {
            max-width: 1400px;
            margin: 0 auto;
            height: 100vh;
        }

        /* ===== Header ===== */
        .hdr {
            height: 56px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
        }
        .hdr-logo {
            width: 34px; height: 34px;
            background: var(--accent);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 15px;
        }
        .hdr-title { font-weight: 600; font-size: 16px; }
        .hdr-sub { font-size: 12px; color: var(--text-sec); margin-left: 4px; }

        /* ===== Layout ===== */
        .wrap { display: flex; height: calc(100vh - 56px); }

        /* ===== Left ===== */
        .left {
            width: 380px; min-width: 380px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 28px 24px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }
        .left::-webkit-scrollbar { width: 4px; }
        .left::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

        .sec-label {
            font-size: 12px; font-weight: 600;
            color: var(--text-sec);
            letter-spacing: 1px;
        }

        /* Upload */
        .up-area {
            border: 1px solid var(--border);
            border-radius: var(--radius-s);
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            background: #fafafa;
            min-height: 120px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .up-area:hover { border-color: #999; }
        .up-area.has { border-color: var(--accent); padding: 8px; background: #fff; }
        .up-ico { font-size: 24px; margin-bottom: 8px; color: #bbb; }
        .up-txt { font-size: 13px; color: var(--text-sec); line-height: 1.6; }
        .up-hint { font-size: 11px; color: #bbb; margin-top: 4px; }
        .up-prev { max-width: 100%; max-height: 200px; border-radius: 6px; object-fit: contain; }
        .up-rm {
            position: absolute; top: 6px; right: 6px;
            width: 24px; height: 24px;
            background: rgba(0,0,0,.4); color: #fff;
            border: none; border-radius: 50%;
            cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s;
        }
        .up-rm:hover { background: rgba(0,0,0,.7); }

        /* Steps */
        .steps {
            background: #f8f8fa;
            border-radius: var(--radius-s);
            padding: 14px 16px;
            font-size: 12px;
            line-height: 2;
            color: var(--text-sec);
        }
        .steps b { color: var(--text); display: block; margin-bottom: 2px; font-size: 13px; }
        .step-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px;
            background: var(--accent); color: #fff;
            border-radius: 50%; font-size: 10px; font-weight: 600;
            margin-right: 6px; vertical-align: middle;
        }

        /* Generate button */
        .gen-btn {
            width: 100%; padding: 13px;
            background: var(--accent); color: #fff;
            border: none; border-radius: var(--radius-s);
            font-size: 14px; font-weight: 500;
            cursor: pointer; font-family: inherit;
            transition: all .2s;
            margin-top: auto;
        }
        .gen-btn:hover { background: var(--accent-h); }
        .gen-btn:disabled { opacity: .4; cursor: not-allowed; }

        /* ===== Right ===== */
        .right {
            flex: 1; padding: 32px; overflow-y: auto;
            display: flex; flex-direction: column;
        }
        .right::-webkit-scrollbar { width: 6px; }
        .right::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

        /* Empty */
        .empty {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .empty-ico {
            width: 72px; height: 72px;
            border: 2px solid var(--border);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            transform: rotate(45deg);
            margin-bottom: 24px;
        }
        .empty-ico span { transform: rotate(-45deg); font-size: 24px; color: #ccc; }
        .empty-t { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
        .empty-d { font-size: 13px; color: var(--text-sec); max-width: 360px; line-height: 1.7; }

        /* Loading */
        .ldg { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spin {
            width: 40px; height: 40px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: sp .7s linear infinite;
        }
        @keyframes sp { to { transform: rotate(360deg); } }
        .ldg-txt { margin-top: 16px; font-size: 14px; color: var(--text-sec); }
        .ldg-sub { margin-top: 4px; font-size: 12px; color: #bbb; }

        /* Result */
        .res-wrap {
            max-width: 800px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        .res-top {
            width: 100%;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .res-top h2 { font-size: 16px; font-weight: 500; }
        .new-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; background: var(--card);
            border: 1px solid var(--border); border-radius: var(--radius-s);
            font-size: 12px; cursor: pointer; font-family: inherit;
            transition: all .15s; color: var(--text-sec);
        }
        .new-btn:hover { border-color: #999; color: var(--text); }

        .res-img-wrap {
            width: 100%; background: var(--card);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; display: flex; align-items: center; justify-content: center;
        }
        .res-img {
            max-width: 100%; max-height: 70vh;
            border-radius: 6px; object-fit: contain;
        }

        .res-actions {
            margin-top: 16px; display: flex; gap: 12px;
        }
        .dl-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 24px;
            background: var(--accent); color: #fff;
            border: none; border-radius: var(--radius-s);
            font-size: 13px; font-weight: 500;
            cursor: pointer; font-family: inherit;
            transition: all .2s;
            text-decoration: none;
        }
        .dl-btn:hover { background: var(--accent-h); }
        .retry-btn2 {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 24px;
            background: var(--card); color: var(--text-sec);
            border: 1px solid var(--border); border-radius: var(--radius-s);
            font-size: 13px; cursor: pointer; font-family: inherit;
            transition: all .15s;
        }
        .retry-btn2:hover { border-color: #999; color: var(--text); }

        /* Error */
        .err { text-align: center; padding: 40px; }
        .err-ico { font-size: 40px; margin-bottom: 16px; }
        .err-t { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .err-d { font-size: 13px; color: var(--text-sec); line-height: 1.7; max-width: 400px; margin: 0 auto; }
        .retry-btn {
            margin-top: 16px; padding: 10px 28px;
            background: var(--accent); color: #fff;
            border: none; border-radius: var(--radius-s);
            cursor: pointer; font-size: 13px; font-family: inherit;
        }

        /* Responsive */
        @media (max-width: 860px) {
            .wrap { flex-direction: column; height: auto; }
            .left { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
            .right { min-height: 50vh; }
        }
    </style>
</head>
<body>

<div class="page">
<!-- Header -->
<div class="hdr">
    <div class="hdr-logo">融</div>
    <span class="hdr-title">光影融合</span>
    <span class="hdr-sub">AI产品场景融合</span>
</div>

<!-- Main -->
<div class="wrap">
    <!-- Left Panel -->
    <div class="left">
        <div class="sec-label">上传拼合图</div>

        <div class="up-area" id="fArea" onclick="$('fFile').click()" ondragover="dOver(event,this)" ondragleave="dLeave(event,this)" ondrop="dDrop(event,this)">
            <input type="file" id="fFile" accept="image/*" style="display:none" onchange="fSel(event)">
            <div id="fContent">
                <div class="up-ico">⬆</div>
                <div class="up-txt">点击上传拼合图</div>
                <div class="up-hint">拖拽图片至此或点击浏览</div>
            </div>
        </div>

        <div class="steps">
            <b>使用步骤</b>
            <div><span class="step-num">1</span>用扩词器生成背景图</div>
            <div><span class="step-num">2</span>PS把产品贴到背景上</div>
            <div><span class="step-num">3</span>上传拼合图，点击融合</div>
            <div><span class="step-num">4</span>获得自然融合的成品图</div>
        </div>

        <button class="gen-btn" id="genBtn" onclick="generate()">开始融合</button>
    </div>

    <!-- Right Panel -->
    <div class="right" id="right">
        <div class="empty" id="vEmpty">
            <div class="empty-ico"><span>◇</span></div>
            <div class="empty-t">准备开始</div>
            <div class="empty-d">上传产品与背景的拼合图，AI帮你消除白边和悬浮感，加上环境光影，输出自然融合的商业场景图</div>
        </div>

        <div class="ldg" id="vLoad" style="display:none">
            <div class="spin"></div>
            <div class="ldg-txt" id="ldgTxt">正在处理图片...</div>
            <div class="ldg-sub" id="ldgSub">融合大约需要15-30秒</div>
        </div>

        <div class="res-wrap" id="vRes" style="display:none">
            <div class="res-top">
                <h2>融合结果</h2>
                <button class="new-btn" onclick="resetAll()">重新开始</button>
            </div>
            <div class="res-img-wrap">
                <img id="resImg" class="res-img" src="" alt="融合结果">
            </div>
            <div class="res-actions">
                <a id="dlLink" class="dl-btn" href="#" download="fusion-result.png">⬇ 下载图片</a>
                <button class="retry-btn2" onclick="generate()">再融合一次</button>
            </div>
        </div>

        <div class="err" id="vErr" style="display:none">
            <div class="err-ico">✕</div>
            <div class="err-t">融合失败</div>
            <div class="err-d" id="errTxt">请稍后重试</div>
            <button class="retry-btn" onclick="generate()">重新融合</button>
        </div>
    </div>
</div>
</div>

<script>
// ===== Config =====
const ARK_API_KEY = 'ark-32e3cca5-30ab-4d17-91c1-5024b1c57850-5bda0';
const ARK_API = 'https://ark.cn-beijing.volces.com/api/v3/images/generations';
const MODEL = 'doubao-seedream-4-0-250828';
const FUSION_PROMPT = '专业商业产品场景摄影，产品完全融入周围环境场景，产品表面呈现真实的环境反射：环境主光源在产品边缘形成自然高光，环境色调映射在产品表面，产品底部有柔和接触阴影，产品与背景之间自然过渡无白色边缘，整体画面光影和谐统一，画面真实自然，8K高清，商业广告级质感';

// imgbb图床（免费，base64→URL，和扣子插件流程一致）
const IMGBB_KEY = '0c5d7267f4b427acda525454bd2230d6';

// ===== State =====
let fFile = null, busy = false;

const $ = id => document.getElementById(id);

// ===== Drag & Drop =====
function dOver(e, el) { e.preventDefault(); el.style.borderColor = '#999'; }
function dLeave(e, el) { if (!el.classList.contains('has')) { el.style.borderColor = ''; } }
function dDrop(e, el) { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) showFile(f); }

function fSel(e) { const f = e.target.files[0]; if (f) showFile(f); }

function showFile(file) {
    fFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        const area = $('fArea');
        const content = $('fContent');
        area.classList.add('has');
        content.innerHTML = `<img src="${e.target.result}" class="up-prev"><button class="up-rm" onclick="event.stopPropagation();clearF()">×</button>`;
    };
    reader.readAsDataURL(file);
}

function clearF() {
    fFile = null;
    $('fFile').value = '';
    const area = $('fArea');
    const content = $('fContent');
    area.classList.remove('has');
    area.style.borderColor = '';
    content.innerHTML = `<div class="up-ico">⬆</div><div class="up-txt">点击上传拼合图</div><div class="up-hint">拖拽图片至此或点击浏览</div>`;
}

// ===== Views =====
function showV(v) {
    $('vEmpty').style.display = v === 'e' ? 'flex' : 'none';
    $('vLoad').style.display  = v === 'l' ? 'flex' : 'none';
    $('vRes').style.display   = v === 'r' ? 'block' : 'none';
    $('vErr').style.display   = v === 'x' ? 'block' : 'none';
}

// ===== File → data URI（不走图床，直接编码）=====
function fileToDataUri(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// ===== Upload original file to imgbb → get URL（备用，暂不用）=====
async function uploadToImgbb(file) {
    // 原文件直传，不经过Canvas压缩
    const formData = new FormData();
    formData.append('image', file);
    formData.append('expiration', '3600'); // 1小时后自动删除

    const res = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_KEY, {
        method: 'POST',
        body: formData
    });

    if (!res.ok) {
        const text = await res.text();
        throw new Error('图床上传失败: ' + text);
    }

    const data = await res.json();
    if (!data.data || !data.data.url) {
        throw new Error('图床未返回图片URL');
    }
    return data.data.url;
}

// ===== Generate =====
async function generate() {
    if (busy) return;
    if (!fFile) return alert('请先上传拼合图');

    busy = true;
    $('genBtn').disabled = true;
    showV('l');

    try {
        // Step 1: 图片转data URI，不走图床，避免海外CDN超时
        $('ldgTxt').textContent = '正在准备图片...';
        $('ldgSub').textContent = '转换图片格式';
        const imageDataUri = await fileToDataUri(fFile);

        // Step 2: 用data URI调用Seedream API
        $('ldgTxt').textContent = '正在融合图片...';
        $('ldgSub').textContent = '融合大约需要15-30秒';

        const res = await fetch(ARK_API, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + ARK_API_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: MODEL,
                prompt: FUSION_PROMPT,
                image: imageDataUri,
                size: '2k',
                stream: false,
                response_format: 'url',
                watermark: false
            })
        });

        const data = await res.json();

        if (res.status !== 200) {
            const errMsg = data.error ? data.error.message : JSON.stringify(data);
            throw new Error('API调用失败: ' + errMsg);
        }

        if (data.data && data.data.length > 0) {
            const item = data.data[0];
            if (item.error) {
                throw new Error('图片生成失败: ' + (item.error.message || '未知错误'));
            }
            if (item.url) {
                showV('r');
                $('resImg').src = item.url;
                $('dlLink').href = item.url;
            } else {
                throw new Error('未获取到图片结果');
            }
        } else {
            throw new Error('未获取到图片结果');
        }

    } catch (err) {
        console.error(err);
        showV('x');
        $('errTxt').textContent = err.message || '请稍后重试';
    } finally {
        busy = false;
        $('genBtn').disabled = false;
    }
}

// ===== Reset =====
function resetAll() {
    clearF();
    showV('e');
}
</script>
</body>
</html>
