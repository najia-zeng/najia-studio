<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娜家扩词器 - AI生图提示词生成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f4f1;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            background: #1a1a1a;
            color: #fff;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
        }
        .top-bar h1 { font-size: 16px; font-weight: 700; letter-spacing: 2px; }
        .top-bar .tag { font-size: 12px; color: #888; letter-spacing: 1px; }
        .main { display: flex; height: calc(100vh - 50px); }
        .left-panel {
            width: 340px; min-width: 340px; background: #fff;
            border-right: 1px solid #e8e5e0; padding: 24px 20px;
            overflow-y: auto; display: flex; flex-direction: column; gap: 18px;
        }
        .section-title {
            font-size: 12px; font-weight: 600; color: #999;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }
        .mode-cards { display: flex; flex-direction: column; gap: 8px; }
        .mode-card {
            padding: 12px 14px; background: #faf9f7; border: 1.5px solid #e8e5e0;
            border-radius: 10px; cursor: pointer; transition: all 0.15s;
        }
        .mode-card:hover { border-color: #aaa; }
        .mode-card.active { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
        .mode-card.active p { opacity: 0.7; }
        .mode-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .mode-card p { font-size: 11px; opacity: 0.5; line-height: 1.4; }
        .steps { list-style: none; counter-reset: step; padding-top: 4px; }
        .steps li {
            counter-increment: step; position: relative; padding-left: 30px;
            margin-bottom: 12px; font-size: 12px; color: #666; line-height: 1.7;
        }
        .steps li::before {
            content: counter(step); position: absolute; left: 0; top: 1px;
            width: 20px; height: 20px; background: #1a1a1a; color: #fff;
            border-radius: 50%; font-size: 10px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
        }
        .steps li strong { color: #1a1a1a; }
        .divider { height: 1px; background: #eee; margin: 4px 0; }
        .tip-box {
            background: #faf9f7; border-radius: 8px; padding: 12px 14px;
            font-size: 11px; color: #999; line-height: 1.7;
        }
        .tip-box strong { color: #666; }
        .right-panel {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: #f5f4f1;
            background-image: radial-gradient(#e0ddd8 0.5px, transparent 0.5px);
            background-size: 20px 20px; position: relative;
        }
        .placeholder { text-align: center; color: #ccc; }
        .placeholder .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
        .placeholder p { font-size: 14px; margin-bottom: 4px; }
        .placeholder .sub { font-size: 12px; color: #ccc; }
        .start-btn {
            margin-top: 24px; padding: 10px 28px; background: #1a1a1a; color: #fff;
            border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
            letter-spacing: 1px; cursor: pointer; transition: all 0.15s;
        }
        .start-btn:hover { background: #333; }
        @media (max-width: 768px) {
            .main { flex-direction: column; height: auto; }
            body { overflow: auto; }
            .left-panel { width: 100%; min-width: auto; border-right: none; border-bottom: 1px solid #e8e5e0; }
            .right-panel { min-height: 60vh; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>娜家扩词器</h1>
        <span class="tag">产品信息 → 专业AI生图提示词</span>
    </div>
    <div class="main">
        <div class="left-panel">
            <div>
                <div class="section-title">选择模式</div>
                <div class="mode-cards">
                    <div class="mode-card active" id="mode1Card" onclick="switchMode(1)">
                        <h3>模式一：只给产品图</h3>
                        <p>生成3个不同场景的提示词</p>
                    </div>
                    <div class="mode-card" id="mode2Card" onclick="switchMode(2)">
                        <h3>模式二：产品图 + 参考风格图</h3>
                        <p>生成1个融合风格的提示词</p>
                    </div>
                </div>
            </div>
            <div class="divider"></div>
            <div>
                <div class="section-title">操作步骤</div>
                <ul class="steps" id="stepsGuide">
                    <li>点击右下角 <strong>💬 对话按钮</strong> 打开聊天</li>
                    <li>点击 <strong>📎 附件</strong> 上传产品图</li>
                    <li>输入 <strong>"生成提示词"</strong> 发送</li>
                    <li>等待30-60秒，复制提示词</li>
                </ul>
            </div>
            <div class="divider"></div>
            <div class="tip-box" id="tipBox">
                <strong>💡 小贴士</strong><br>
                上传清晰的产品图效果更好。可以加一句话指定方向，比如"帮我生成清新自然风格的"。
            </div>
        </div>
        <div class="right-panel">
            <div class="placeholder">
                <div class="icon">✨</div>
                <p>点击右下角开始对话</p>
                <p class="sub">上传产品图，生成专业AI生图提示词</p>
                <button class="start-btn" onclick="openChat()">开始使用</button>
            </div>
        </div>
    </div>
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.10/libs/cn/index.js"></script>
    <script>
        var chatClient = null;
        if (typeof CozeWebSDK !== 'undefined') {
            chatClient = new CozeWebSDK.WebChatClient({
                config: { botId: '7648485634986115106' },
                auth: {
                    type: 'token',
                    token: 'pat_V3wKxA8IXX28gEydvWtSTABYuKYzuRVQ7QkWH8EG9douyKWuajqd5bqbpGSnOHum',
                    onRefreshToken: async function() {
                        return 'pat_V3wKxA8IXX28gEydvWtSTABYuKYzuRVQ7QkWH8EG9douyKWuajqd5bqbpGSnOHum';
                    },
                },
                ui: {
                    asstBtn: { isNeed: true },
                    base: { lang: 'zh-CN' },
                    chatBot: { title: '娜家扩词器', uploadable: true },
                    footer: { isShow: false },
                },
            });
        }
        function switchMode(mode) {
            var card1 = document.getElementById('mode1Card');
            var card2 = document.getElementById('mode2Card');
            var steps = document.getElementById('stepsGuide');
            var tip = document.getElementById('tipBox');
            if (mode === 1) {
                card1.classList.add('active'); card2.classList.remove('active');
                steps.innerHTML = '<li>点击右下角 <strong>💬 对话按钮</strong> 打开聊天</li><li>点击 <strong>📎 附件</strong> 上传产品图</li><li>输入 <strong>"生成提示词"</strong> 发送</li><li>等待30-60秒，复制提示词</li>';
                tip.innerHTML = '<strong>💡 小贴士</strong><br>上传清晰的产品图效果更好。可以加一句话指定方向，比如"帮我生成清新自然风格的"。';
            } else {
                card1.classList.remove('active'); card2.classList.add('active');
                steps.innerHTML = '<li>点击右下角 <strong>💬 对话按钮</strong> 打开聊天</li><li>点击 <strong>📎 附件</strong> 上传产品图，输入 <strong>"这是产品图"</strong></li><li>再次点击 <strong>📎 附件</strong> 上传风格参考图，输入 <strong>"这是参考风格，请融合生成"</strong></li><li>等待30-60秒，获取融合风格提示词</li>';
                tip.innerHTML = '<strong>💡 小贴士</strong><br>模式二需要分两步发送：先发产品图说"这是产品图"，再发风格图说"参考风格"，扩词器会自动结合两张图生成提示词。';
            }
        }
        function openChat() { if (chatClient) chatClient.showChatBot(); }
    </script>
</body>
</html>
