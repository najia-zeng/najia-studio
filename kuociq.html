<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娜家扩词器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --card: #ffffff;
            --border: #e8e8ed;
            --text: #1d1d1f;
            --text-sec: #86868b;
            --text-tri: #c7c7cc;
            --field-bg: #f9f9fb;
            --prompt-bg: #f5f5f7;
            --radius: 16px;
            --radius-s: 10px;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .outer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px;
        }

        /* ===== Header ===== */
        .hdr {
            padding: 28px 0 20px;
            border-bottom: 1px solid var(--border);
        }
        .hdr-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .hdr-sub { font-size: 13px; color: var(--text-sec); margin-top: 4px; font-weight: 400; }

        /* ===== Layout ===== */
        .wrap {
            display: flex;
            gap: 40px;
            padding: 32px 0 48px;
            min-height: calc(100vh - 110px);
        }

        /* ===== Left ===== */
        .left {
            width: 340px;
            min-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sec-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 10px; }

        /* Mode cards */
        .m-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            cursor: pointer;
            transition: all .2s;
            background: var(--bg);
        }
        .m-card:hover { border-color: #b8b8bf; }
        .m-card.on { border-color: var(--text); }
        .m-head { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .m-label { font-size: 11px; font-weight: 500; color: var(--text-sec); letter-spacing: 0.5px; }
        .m-name { font-size: 14px; font-weight: 600; }
        .m-desc { font-size: 12px; color: var(--text-sec); line-height: 1.5; }

        /* Upload */
        .up-area {
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: var(--field-bg);
            min-height: 120px;
            display: flex; align-items: center; justify-content: center;
        }
        .up-area:hover { border-color: var(--text-sec); background: #f3f3f6; }
        .up-area.has { border-style: solid; border-color: var(--border); padding: 10px; background: var(--bg); }
        .up-ico { font-size: 20px; color: var(--text-tri); margin-bottom: 8px; }
        .up-txt { font-size: 13px; color: var(--text-sec); }
        .up-hint { font-size: 11px; color: var(--text-tri); margin-top: 4px; }
        .up-prev { max-width: 100%; max-height: 180px; border-radius: 8px; object-fit: contain; }
        .up-rm {
            position: absolute; top: 8px; right: 8px;
            width: 22px; height: 22px;
            background: rgba(0,0,0,.3); color: #fff;
            border: none; border-radius: 50%;
            cursor: pointer; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
        }
        .up-rm:hover { background: rgba(0,0,0,.55); }

        .field-label { font-size: 13px; font-weight: 500; color: var(--text-sec); margin-bottom: 8px; display: block; }
        .inp-textarea {
            width: 100%; padding: 10px 14px;
            border: 1px solid var(--border); border-radius: var(--radius-s);
            font-size: 13px; font-family: inherit;
            resize: vertical; min-height: 48px;
            background: var(--field-bg);
            transition: border-color .2s;
        }
        .inp-textarea:focus { outline: none; border-color: var(--text); background: var(--bg); }
        .inp-textarea::placeholder { color: var(--text-tri); }

        /* Generate button */
        .gen-btn {
            width: 100%; padding: 12px;
            background: var(--text); color: #fff;
            border: none; border-radius: var(--radius-s);
            font-size: 14px; font-weight: 500;
            cursor: pointer; font-family: inherit;
            transition: all .15s;
            margin-top: auto;
        }
        .gen-btn:hover { background: #3a3a3c; }
        .gen-btn:active { transform: scale(.98); }
        .gen-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

        /* ===== Right ===== */
        .right {
            flex: 1;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .right-inner {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .right-top {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }
        .right-title { font-size: 14px; font-weight: 600; }
        .right-actions { display: flex; gap: 8px; }
        .act-btn {
            padding: 5px 14px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 12px; cursor: pointer; font-family: inherit;
            color: var(--text-sec); transition: all .15s;
        }
        .act-btn:hover { border-color: var(--text); color: var(--text); }

        .right-body {
            flex: 1; overflow-y: auto; padding: 28px;
        }
        .right-body::-webkit-scrollbar { width: 4px; }
        .right-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

        /* Empty state */
        .empty {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; color: var(--text-tri);
        }
        .empty-ico { font-size: 48px; margin-bottom: 16px; opacity: .5; }
        .empty-t { font-size: 16px; font-weight: 600; color: var(--text-sec); margin-bottom: 6px; }
        .empty-d { font-size: 13px; color: var(--text-tri); max-width: 300px; line-height: 1.7; }

        /* Loading */
        .ldg { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spin { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: sp .8s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }
        .ldg-txt { margin-top: 16px; font-size: 13px; color: var(--text-sec); }

        /* Result */
        .res-wrap { max-width: 100%; }

        /* ===== Prompt card (light bg, individual copy) ===== */
        .prompt-card {
            background: var(--prompt-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-s);
            padding: 20px;
            margin: 16px 0;
            position: relative;
        }
        .prompt-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }
        .prompt-card-body {
            font-size: 13px;
            line-height: 1.85;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .prompt-copy {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 4px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            color: var(--text-sec);
            transition: all .15s;
        }
        .prompt-copy:hover { border-color: var(--text); color: var(--text); }

        /* Markdown (for analysis text) */
        .md-body { line-height: 1.85; font-size: 13.5px; color: #333; }
        .md-body h2 { font-size: 16px; font-weight: 700; margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
        .md-body h3 { font-size: 14px; font-weight: 600; margin: 20px 0 8px; color: var(--text); }
        .md-body p { margin-bottom: 12px; }
        .md-body strong { color: var(--text); font-weight: 600; }
        .md-body ul, .md-body ol { padding-left: 18px; margin-bottom: 12px; }
        .md-body li { margin-bottom: 3px; }
        .md-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .md-body blockquote { border-left: 2px solid var(--text-tri); padding-left: 14px; color: var(--text-sec); margin: 12px 0; }
        .md-body code { background: var(--field-bg); padding: 2px 6px; border-radius: 4px; font-size: 12.5px; }
        .md-body pre { display: none; }

        /* Error */
        .err { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .err-ico { font-size: 40px; margin-bottom: 12px; opacity: .5; }
        .err-t { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .err-d { font-size: 13px; color: var(--text-sec); max-width: 320px; line-height: 1.7; }
        .retry-btn { margin-top: 16px; padding: 8px 24px; background: var(--text); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; }

        /* Responsive */
        @media (max-width: 860px) {
            .outer { padding: 0 20px; }
            .wrap { flex-direction: column; gap: 24px; }
            .left { width: 100%; min-width: 0; }
            .right { min-height: 400px; }
        }
    </style>
</head>
<body>

<div class="outer">
    <div class="hdr">
        <div class="hdr-title">提示词生成</div>
        <div class="hdr-sub">上传产品图片，生成专业AI摄影提示词</div>
    </div>

    <div class="wrap">
        <!-- Left -->
        <div class="left">
            <div>
                <div class="sec-title">创作模式</div>
                <div style="display:flex;flex-direction:column;gap:8px">
                    <div class="m-card on" id="m1" onclick="setMode(1)">
                        <div class="m-head">
                            <span class="m-label">模式一</span>
                            <span class="m-name">仅产品图</span>
                        </div>
                        <div class="m-desc">上传一张产品图，生成3个不同场景的提示词</div>
                    </div>
                    <div class="m-card" id="m2" onclick="setMode(2)">
                        <div class="m-head">
                            <span class="m-label">模式二</span>
                            <span class="m-name">产品图 + 参考图</span>
                        </div>
                        <div class="m-desc">上传产品图和参考风格图，生成融合风格的提示词</div>
                    </div>
                </div>
            </div>

            <div>
                <div class="sec-title">上传图片</div>
                <div style="display:flex;flex-direction:column;gap:10px">
                    <div>
                        <span class="field-label">产品图</span>
                        <div class="up-area" id="pArea" onclick="$('pFile').click()" ondragover="dOver(event,this)" ondragleave="dLeave(event,this)" ondrop="dDrop(event,this,'p')">
                            <input type="file" id="pFile" accept="image/*" style="display:none" onchange="fSel(event,'p')">
                            <div id="pContent">
                                <div class="up-ico">↑</div>
                                <div class="up-txt">点击上传产品图</div>
                                <div class="up-hint">拖拽图片至此或点击浏览</div>
                            </div>
                        </div>
                    </div>
                    <div id="refSec" style="display:none">
                        <span class="field-label">参考风格图</span>
                        <div class="up-area" id="rArea" onclick="$('rFile').click()" ondragover="dOver(event,this)" ondragleave="dLeave(event,this)" ondrop="dDrop(event,this,'r')">
                            <input type="file" id="rFile" accept="image/*" style="display:none" onchange="fSel(event,'r')">
                            <div id="rContent">
                                <div class="up-ico">↑</div>
                                <div class="up-txt">点击上传参考图</div>
                                <div class="up-hint">拖拽图片至此或点击浏览</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <span class="field-label">补充说明（选填）</span>
                <textarea class="inp-textarea" id="desc" placeholder='例如：白色釉面陶瓷咖啡杯'></textarea>
            </div>

            <button class="gen-btn" id="genBtn" onclick="generate()">生成提示词</button>
        </div>

        <!-- Right -->
        <div class="right">
            <div class="right-inner">
                <div class="right-top">
                    <span class="right-title" id="rTitle">生成结果</span>
                    <div class="right-actions" id="rActions" style="display:none">
                        <button class="act-btn" onclick="resetAll()">重新开始</button>
                    </div>
                </div>
                <div class="right-body" id="rBody">
                    <div class="empty" id="vEmpty">
                        <div class="empty-ico">◇</div>
                        <div class="empty-t">准备开始</div>
                        <div class="empty-d">上传产品图片，生成可直接使用的AI摄影提示词</div>
                    </div>
                    <div class="ldg" id="vLoad" style="display:none">
                        <div class="spin"></div>
                        <div class="ldg-txt" id="ldgTxt">正在上传图片...</div>
                    </div>
                    <div class="res-wrap" id="vRes" style="display:none">
                        <div class="md-body" id="resBody"></div>
                    </div>
                    <div class="err" id="vErr" style="display:none">
                        <div class="err-ico">✕</div>
                        <div class="err-t">生成失败</div>
                        <div class="err-d" id="errTxt">请稍后重试</div>
                        <button class="retry-btn" onclick="generate()">重新生成</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const BOT_ID = '7648485634986115106';
const API = 'https://api.coze.cn';
const PAT = 'pat_V3wKxA8IXX28gEydvWtSTABYuKYzuRVQ7QkWH8EG9douyKWuajqd5bqbpGSnOHum';

let mode = 1, pFile = null, rFile = null, busy = false;
let uid = 'u_' + Math.random().toString(36).slice(2, 11);

const $ = id => document.getElementById(id);

function setMode(m) {
    mode = m;
    $('m1').classList.toggle('on', m === 1);
    $('m2').classList.toggle('on', m === 2);
    $('refSec').style.display = m === 2 ? 'block' : 'none';
    if (m === 1) { rFile = null; resetArea('r'); }
}

function dOver(e, el) { e.preventDefault(); el.style.borderColor = 'var(--text-sec)'; el.style.background = '#f3f3f6'; }
function dLeave(e, el) { if (!el.classList.contains('has')) { el.style.borderColor = ''; el.style.background = ''; } }
function dDrop(e, el, t) { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) showFile(f, t); }
function fSel(e, t) { const f = e.target.files[0]; if (f) showFile(f, t); }

function showFile(file, t) {
    const reader = new FileReader();
    reader.onload = e => {
        if (t === 'p') pFile = file; else rFile = file;
        const area = $(t === 'p' ? 'pArea' : 'rArea');
        const content = $(t === 'p' ? 'pContent' : 'rContent');
        area.classList.add('has');
        content.innerHTML = `<img src="${e.target.result}" class="up-prev"><button class="up-rm" onclick="event.stopPropagation();clearF('${t}')">×</button>`;
    };
    reader.readAsDataURL(file);
}

function clearF(t) {
    if (t === 'p') { pFile = null; $('pFile').value = ''; } else { rFile = null; $('rFile').value = ''; }
    resetArea(t);
}

function resetArea(t) {
    const area = $(t === 'p' ? 'pArea' : 'rArea');
    const content = $(t === 'p' ? 'pContent' : 'rContent');
    area.classList.remove('has');
    area.style.borderColor = ''; area.style.background = '';
    const lbl = t === 'p' ? '产品图' : '参考图';
    content.innerHTML = `<div class="up-ico">↑</div><div class="up-txt">点击上传${lbl}</div><div class="up-hint">拖拽图片至此或点击浏览</div>`;
}

function showV(v) {
    $('vEmpty').style.display = v === 'e' ? 'flex' : 'none';
    $('vLoad').style.display  = v === 'l' ? 'flex' : 'none';
    $('vRes').style.display   = v === 'r' ? 'block' : 'none';
    $('vErr').style.display   = v === 'x' ? 'flex' : 'none';
    $('rActions').style.display = v === 'r' ? 'flex' : 'none';
}

async function generate() {
    if (busy) return;
    if (!pFile) return alert('请先上传产品图');
    if (mode === 2 && !rFile) return alert('请上传参考风格图');

    busy = true;
    $('genBtn').disabled = true;
    showV('l');

    try {
        $('ldgTxt').textContent = '正在上传图片...';
        const pId = await uploadFile(pFile);
        let rId = null;
        if (mode === 2 && rFile) rId = await uploadFile(rFile);

        $('ldgTxt').textContent = '正在生成提示词...';
        const answer = await doChat(pId, rId);

        showV('r');
        renderResult(answer);
    } catch (err) {
        console.error(err);
        showV('x');
        $('errTxt').textContent = err.message || '请稍后重试';
    } finally {
        busy = false;
        $('genBtn').disabled = false;
    }
}

async function uploadFile(file) {
    const fd = new FormData();
    fd.append('file', file);
    const r = await fetch(`${API}/v1/files/upload`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${PAT}` },
        body: fd
    });
    const d = await r.json();
    if (d.code !== 0) throw new Error(`上传失败: ${d.msg || JSON.stringify(d)}`);
    return d.data.id;
}

async function doChat(pId, rId) {
    const desc = $('desc').value.trim();
    const parts = [];

    if (mode === 1) {
        let txt = '请根据我上传的产品图';
        if (desc) txt += `（${desc}）`;
        txt += '，生成3个不同场景的AI生图提示词。';
        parts.push({ type: 'text', text: txt });
        parts.push({ type: 'image', file_id: pId });
    } else {
        let txt = '第一张是产品图，第二张是参考风格图';
        if (desc) txt += `（产品：${desc}）`;
        txt += '。请生成融合参考图风格的AI生图提示词。';
        parts.push({ type: 'text', text: txt });
        parts.push({ type: 'image', file_id: pId });
        if (rId) parts.push({ type: 'image', file_id: rId });
    }

    const cr = await fetch(`${API}/v3/chat`, {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${PAT}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            bot_id: BOT_ID,
            user_id: uid,
            stream: false,
            auto_save_history: true,
            additional_messages: [{
                role: 'user',
                content: JSON.stringify(parts),
                content_type: 'object_string'
            }]
        })
    });
    const cd = await cr.json();
    if (cd.code !== 0) throw new Error(`对话失败: ${cd.msg || JSON.stringify(cd)}`);

    const chatId = cd.data.id;
    const convId = cd.data.conversation_id;

    for (let i = 0; i < 90; i++) {
        await sleep(2000);
        $('ldgTxt').textContent = `正在生成... (${(i + 1) * 2}s)`;
        const sr = await fetch(`${API}/v3/chat/retrieve?chat_id=${chatId}&conversation_id=${convId}`, {
            headers: { 'Authorization': `Bearer ${PAT}` }
        });
        const sd = await sr.json();
        if (sd.code !== 0) throw new Error(`状态查询失败: ${sd.msg}`);
        if (sd.data.status === 'completed') return await getMsgs(convId, chatId);
        if (sd.data.status === 'failed') throw new Error('生成失败，请重试');
    }
    throw new Error('生成超时，请重试');
}

async function getMsgs(convId, chatId) {
    const r = await fetch(`${API}/v3/chat/message/list?chat_id=${chatId}&conversation_id=${convId}`, {
        headers: { 'Authorization': `Bearer ${PAT}` }
    });
    const d = await r.json();
    if (d.code !== 0) throw new Error(`获取结果失败: ${d.msg}`);
    for (const m of (d.data || [])) {
        if (m.role === 'assistant' && m.type === 'answer') return m.content;
    }
    throw new Error('未获取到有效回复');
}

// ===== Parse result: extract analysis + prompt blocks =====
function renderResult(text) {
    const container = $('resBody');
    container.innerHTML = '';

    // Extract all code blocks (the actual prompts)
    const codeBlockRegex = /```[\w]*\n([\s\S]*?)```/g;
    const prompts = [];
    let match;
    while ((match = codeBlockRegex.exec(text)) !== null) {
        prompts.push(match[1].trim());
    }

    // Remove code blocks from text to get the analysis part
    const analysisText = text.replace(/```[\w]*\n[\s\S]*?```/g, '').trim();

    // Render analysis as markdown
    const analysisDiv = document.createElement('div');
    analysisDiv.className = 'md-body';
    analysisDiv.innerHTML = marked.parse(analysisText);
    container.appendChild(analysisDiv);

    // Render each prompt as a separate card
    if (prompts.length > 0) {
        const sectionTitle = document.createElement('div');
        sectionTitle.style.cssText = 'font-size:16px;font-weight:700;margin:28px 0 8px;padding-bottom:8px;border-bottom:1px solid var(--border)';
        sectionTitle.textContent = prompts.length === 1 ? '提示词' : '提示词';
        container.appendChild(sectionTitle);

        prompts.forEach((prompt, idx) => {
            const card = document.createElement('div');
            card.className = 'prompt-card';

            // Extract title from first line if it looks like a scene label
            const lines = prompt.split('\n');
            let title = `场景 ${idx + 1}`;
            let body = prompt;

            // Try to extract scene title from patterns like "场景一：XXX" or "**场景一：XXX**"
            const titleMatch = prompt.match(/[*]*场景[一二三四三]+[：:]\s*([^*\n]+)/);
            if (titleMatch) {
                title = titleMatch[1].trim();
            }

            card.innerHTML = `
                <div class="prompt-card-title">${title}</div>
                <div class="prompt-card-body">${escapeHtml(body)}</div>
                <button class="prompt-copy" onclick="copyPrompt(this)">复制</button>
            `;
            container.appendChild(card);
        });
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function copyPrompt(btn) {
    const body = btn.parentElement.querySelector('.prompt-card-body');
    navigator.clipboard.writeText(body.textContent).then(() => {
        btn.textContent = '已复制';
        setTimeout(() => btn.textContent = '复制', 1500);
    });
}

function resetAll() {
    uid = 'u_' + Math.random().toString(36).slice(2, 11);
    clearF('p');
    if (mode === 2) clearF('r');
    $('desc').value = '';
    showV('e');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
