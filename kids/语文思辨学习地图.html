<title>思辨·七上古诗文学习地图</title>
<style>
:root{--primary:#2a7d6e;--primary-light:#e8f5f1;--accent:#e8913a;--accent-light:#fef3e6;--bg:#f7f8fa;--card:#fff;--text:#2c3e50;--text-light:#7f8c9b;--border:#e8ecf1;--success:#27ae60;--success-light:#e8f8ef;--warning:#f39c12;--warning-light:#fef9e7;--info:#3498db;--info-light:#e8f4fd;--danger:#e74c3c;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.nav-bar{display:flex;justify-content:center;gap:12px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border)}
.nav-btn{padding:6px 18px;border-radius:20px;font-size:.85em;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text-light);transition:all .2s;text-decoration:none}
.nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.nav-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.header{background:linear-gradient(135deg,#2a7d6e 0%,#1a5c50 100%);color:#fff;padding:32px 20px;text-align:center}
.header h1{font-size:1.6em;font-weight:700;margin-bottom:6px;letter-spacing:1px}
.header p{font-size:.9em;opacity:.85;font-weight:300}
.stats-bar{display:flex;justify-content:center;gap:16px;padding:16px 20px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-size:1.5em;font-weight:700}
.stat-num.teal{color:var(--primary)}
.stat-num.green{color:var(--success)}
.stat-num.orange{color:var(--accent)}
.stat-num.blue{color:var(--info)}
.stat-label{font-size:.72em;color:var(--text-light)}
.container{max-width:720px;margin:0 auto;padding:20px 16px}
.unit-section{margin-bottom:24px}
.unit-title{font-size:1.05em;font-weight:600;color:var(--primary);padding:10px 16px;background:var(--primary-light);border-radius:var(--radius);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.unit-title .badge{font-size:.7em;background:var(--primary);color:#fff;padding:2px 8px;border-radius:10px}
.text-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;border:1px solid var(--border);transition:all .2s}
.text-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.card-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.card-header:hover{background:#fafbfc}
.card-left{flex:1}
.card-title{font-size:1em;font-weight:600;color:var(--text)}
.card-meta{font-size:.8em;color:var(--text-light);margin-top:2px}
.card-right{display:flex;align-items:center;gap:8px}
.type-tag{font-size:.7em;padding:2px 8px;border-radius:10px;font-weight:500}
.type-tag.poem{background:#e8f0fe;color:#3b78e7}
.type-tag.prose{background:#fef3e6;color:#e8913a}
.status-tag{font-size:.7em;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.status-tag.pass{background:var(--success-light);color:var(--success)}
.status-tag.progress{background:var(--warning-light);color:var(--warning)}
.status-tag.todo{background:#f0f0f0;color:#aaa}
.progress-dots{display:flex;gap:3px}
.dot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:all .2s}
.dot.done{background:var(--success)}
.expand-icon{font-size:.8em;color:var(--text-light);transition:transform .2s}
.text-card.expanded .expand-icon{transform:rotate(180deg)}
.card-body{padding:0 16px;max-height:0;overflow:hidden;transition:all .3s ease}
.text-card.expanded .card-body{padding:16px;max-height:12000px}
.original-text{background:#fafbfc;border-radius:8px;padding:16px;font-size:.95em;line-height:2;color:var(--text);white-space:pre-line;border-left:3px solid var(--primary);margin-bottom:14px}
.vocab-section h4{font-size:.85em;color:var(--primary);margin-bottom:8px;font-weight:600}
.vocab-list{display:flex;flex-wrap:wrap;gap:6px}
.vocab-item{background:var(--primary-light);padding:4px 10px;border-radius:6px;font-size:.82em;color:var(--text)}
.vocab-item .word{font-weight:600;color:var(--primary)}
.progress-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.progress-section h4{font-size:.85em;color:var(--text-light);margin-bottom:10px}
.progress-btns{display:flex;gap:8px;flex-wrap:wrap}
.p-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:.8em;cursor:pointer;background:#fff;color:var(--text-light);transition:all .2s}
.p-btn:hover{border-color:var(--primary);color:var(--primary)}
.p-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.p-btn.active.step1{background:var(--info);border-color:var(--info)}
.p-btn.active.step2{background:var(--accent);border-color:var(--accent)}
.p-btn.active.step3{background:var(--success);border-color:var(--success)}

.report-box{background:#f8f9fb;border-radius:10px;padding:16px;margin-top:14px;border:1px solid var(--border)}
.report-box h4{font-size:.9em;color:var(--primary);margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:6px}
.report-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #eee;font-size:.85em}
.report-row:last-child{border-bottom:none}
.report-label{color:var(--text-light);min-width:80px}
.report-value{color:var(--text);font-weight:500}
.report-value.green{color:var(--success)}
.report-value.red{color:var(--danger)}
.report-value.orange{color:var(--warning)}
.stage-tag{display:inline-flex;align-items:center;gap:4px;font-size:.78em;padding:2px 8px;border-radius:6px;font-weight:500}
.stage-tag.pass{background:var(--success-light);color:var(--success)}
.stage-tag.fail{background:#fff5f5;color:var(--danger)}
.stage-tag.skip{background:#f5f5f5;color:#999}
.process-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 18px;background:var(--primary);color:#fff;border:none;border-radius:20px;font-size:.85em;font-weight:600;cursor:pointer;transition:all .2s}
.process-btn:hover{background:#1a5c50;transform:translateY(-1px)}
.process-btn:active{transform:translateY(0)}
.chat-panel{margin-top:14px;max-height:0;overflow:hidden;transition:all .3s ease}
.chat-panel.open{max-height:6000px}
.round-chat{margin-bottom:16px}
.round-chat-header{font-size:.88em;font-weight:700;color:var(--primary);padding:8px 12px;background:var(--primary-light);border-radius:8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.chat-bubble{margin-bottom:8px;display:flex;gap:8px;align-items:flex-start}
.chat-bubble.ai{flex-direction:row}
.chat-bubble.kid{flex-direction:row-reverse}
.chat-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8em;flex-shrink:0}
.chat-avatar.ai-avatar{background:var(--primary-light);color:var(--primary)}
.chat-avatar.kid-avatar{background:#fce4ec;color:#e91e63}
.chat-content{max-width:80%;padding:10px 14px;border-radius:12px;font-size:.85em;line-height:1.6;word-break:break-word}
.chat-content p{margin:0 0 4px}.chat-content p:last-child{margin:0}
.chat-content strong{font-weight:700;color:inherit}
.chat-content ul{margin:4px 0;padding-left:18px}.chat-content li{margin:2px 0}
.chat-bubble.ai .chat-content{background:var(--primary-light);color:var(--text);border-top-left-radius:4px}
.chat-bubble.kid .chat-content{background:#fce4ec;color:var(--text);border-top-right-radius:4px}
.chat-eval{margin-top:4px;font-size:.78em;color:var(--success);font-weight:500}
.chat-eval.wrong{color:var(--danger)}
.motto-box{background:linear-gradient(135deg,#2a7d6e 0%,#1a5c50 100%);color:#fff;border-radius:10px;padding:14px 16px;margin-top:12px;font-size:.85em;font-weight:300;line-height:1.7;text-align:center}
.footer{text-align:center;padding:20px;color:var(--text-light);font-size:.8em;border-top:1px solid var(--border);margin-top:20px}
@media(max-width:480px){.header h1{font-size:1.3em}.stats-bar{gap:10px}.container{padding:12px 10px}.card-header{padding:12px}.chat-content{max-width:88%}}
</style>
</head>

chat:{"stage1": [{"who": "ai", "text": "好，验收《次北固山下》，王湾的——一首在船上写的思乡诗，但思乡只是表面。\n\n按三阶来，直接出题。\n\n## 一阶·理解\n\n读完这首诗，你脑子里的画面是什么样的？什么时间？什么季节？你在哪？\n\n\"海日生残夜，江春入旧年\"——这两句是整个诗的核心。你能用自己的话说说这两句在写什么画面吗？它跟前面\"潮平两岸阔，风正一帆悬\"比，情绪一样吗？\n\n## 二阶·思辨\n\n大家都在说这首诗是\"思乡\"，但如果仔细看——王湾说\"客路青山外\"，他是在赶路，不是在家待腻了想出去玩。一个在赶路的人，看到海上升日、旧年未尽新年已到，他想的真的是\"家\"吗？还是别的什么？\n\n先聊理解，想好了直接说。"}, {"who": "kid", "text": "脑子里的画面是青山在外，诗人坐在江上的小船里，潮水涨得很高，江面宽宽的，顺风里船帆直直飘着，天还没完全亮，太阳就已经从海里冒出来了。还没过完旧年，江边就已经有春天的样子了。"}, {"who": "ai", "text": "画面抓得准，每一句都对应上了，尤其\"天还没完全亮太阳就从海里冒出来\"——\"残夜\"和\"海日\"的关系你看到了，不是背翻译，是真的\"看见\"了。\n\n但第二题你只答了画面，没答情绪——\"潮平两岸阔，风正一帆悬\"和\"海日生残夜，江春入旧年\"这两组画面的情绪一样吗？\n\n前面是江面开阔、一帆风顺，情绪是开阔的、顺的；后面突然变成天还没亮太阳就出来了，旧年还没过春天就来了——你有没有觉得这里面藏着一种**\"来不及\"**的感觉？世界在加速往前跑，而你一个人漂在江上？\n\n带着这个感觉进思辨——\n\n第三题：王湾在赶路，不是待在家里无聊。他看到\"海日生残夜，江春入旧年\"——时间在他面前加速，新年没到就来了。一个赶路人看到这种\"来不及\"的画面，他想的真的只是\"我想回家\"吗？还是在想别的什么？"}], "stage2": [{"who": "kid", "text": "他不只是单纯想家。诗人出门赶路，一直在外漂泊。看见太阳赶在夜里升起，春天抢在年前到来，一下子感慨时间过得太快。自己常年在外奔波，虽然最后想寄信回家，看看大雁，思念洛阳老家是真的。但是藏在里面还有别的想法。看着这么壮阔，充满新生希望的景色，他也有对前路的期待，不单单只有想家的忧愁。思乡只是表面的，更多的还有在外漂泊的惆怅，还有看见万物更新的感触。"}, {"who": "ai", "text": "这就对了。\n\n你从\"想家\"里拆出了三层：想家是真的，但不止想家——漂泊的惆怅是真的，看见万物更新的触动也是真的，对前路的期待也是真的。\n\n四种情绪叠在一起，不是单一忧愁。\n\n而且你抓住了一个关键：\"赶\"和\"抢\"——太阳赶在夜里出来，春天抢在年前到来。这不是诗人自己的速度，是世界在他面前跑得太快，他在后面追。一个赶路的人被时间甩在后面，这才是\"乡书何处达\"背后真正的焦虑——不是家远，是觉得自己跟不上这个世界的节奏。\n\n好，进三阶·写作。\n\n把你刚才的理解写成一段话，要求：\n- 开头亮出你的核心观点：这首诗不只是思乡\n- 中间至少用一个诗里的画面做支撑\n- 结尾收回来\n\n不用长，说清楚就行。"}], "stage3": [{"who": "kid", "text": "这首诗不只是单纯抒发思乡之情。你看，海日生残夜，江春入旧年。太阳赶在深夜升起，新春抢在旧年到来，飞速交替的光景让赶路的诗人心生焦虑，感叹自己追不上时光的流逝。最后诗人借鸿雁寄家书的举动，才把藏在心底的乡愁流露出来。思乡只是他复杂心绪最后的落点。"}, {"who": "ai", "text": "结构很干净。\n\n开头一句破题，中间用\"海日生残夜，江春入旧年\"做支撑，结尾\"思乡只是复杂心绪最后的落点\"——收得漂亮，比《观沧海》那篇结构进步明显。\n\n\"太阳赶在深夜升起，新春抢在旧年到来\"——\"赶\"和\"抢\"这两个字你用上了，而且用得很准，把整首诗的时间焦虑感点透了。\n\n如果要再进一步：你之前聊的时候还说了\"对前路的期待\"和\"万物更新的感触\"，写的时候没带进来。现在的文章只写了\"焦虑\"这一面，少了\"希望\"那一面。加上\"万物在加速更新，他其实也感受到了新事物的力量\"，情绪层次会更完整。\n\n不过整体已经过关了。\n\n**《次北固山下》三阶全部通过 ✅**"}]}}},{id:"u1t3",unit:1,type:"poem",title:"闻王昌龄左迁龙标遥有此寄",author:"李白",

{id:"u3t1",unit:3,type:"prose",title:"《论语》十二章",author:"孔子弟子及再传弟子",
text:"\u2460子曰：\u201C学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知而不愠，不亦君子乎？\u201D\n\n\u2461曾子曰：\u201C吾日三省吾身：为人谋而不忠乎？与朋友交而不信乎？传不习乎？\u201D\n\n\u2462子曰：\u201C吾十有五而志于学，三十而立，四十而不惑，五十而知天命，六十而耳顺，七十而从心所欲，不逾矩。\u201D\n\n\u2463子曰：\u201C温故而知新，可以为师矣。\u201D\n\n\u2464子曰：\u201C学而不思则罔，思而不学则殆。\u201D\n\n\u2465子曰：\u201C贤哉，回也！一箪食，一瓢饮，在陋巷，人不堪其忧，回也不改其乐。贤哉，回也！\u201D\n\n\u2466子曰：\u201C知之者不如好之者，好之者不如乐之者。\u201D\n\n\u2467子曰：\u201C饭疏食，饮水，曲肱而枕之，乐亦在其中矣。不义而富且贵，于我如浮云。\u201D\n\n\u2468子曰：\u201C三人行，必有我师焉。择其善者而从之，其不善者而改之。\u201D\n\n\u2469子在川上曰：\u201C逝者如斯夫，不舍昼夜。\u201D\n\n\u246A子曰：\u201C三军可夺帅也，匹夫不可夺志也。\u201D\n\n\u246B子夏曰：\u201C博学而笃志，切问而近思，仁在其中矣。\u201D",
vocab:[{w:"说",d:"同\u2018悦\u2019，愉快"},{w:"愠",d:"生气，恼怒"},{w:"三省",d:"多次反省"},{w:"有",d:"同\u2018又\u2019"},{w:"罔",d:"迷惑"},{w:"殆",d:"疑惑"},{w:"箪",d:"古代盛饭的圆竹器"},{w:"堪",d:"忍受"},{w:"肱",d:"胳膊"},{w:"逝",d:"流逝"},{w:"夺",d:"改变"}],

{id:"u4t1",unit:4,type:"prose",title:"诫子书",author:"诸葛亮",
text:"夫君子之行，静以修身，俭以养德。非淡泊无以明志，非宁静无以致远。夫学须静也，才须学也，非学无以广才，非志无以成学。淫慢则不能励精，险躁则不能治性。年与时驰，意与日去，遂成枯落，多不接世，悲守穷庐，将复何及！",

{id:"u5t1",unit:5,type:"prose",title:"狼",author:"蒲松龄",
text:"一屠晚归，担中肉尽，止有剩骨。途中两狼，缀行甚远。屠惧，投以骨。一狼得骨止，一狼仍从。复投之，后狼止而前狼又至。骨已尽矣，而两狼之并驱如故。屠大窘，恐前后受其敌。顾野有麦场，场主积薪其中，苫蔽成丘。屠乃奔倚其下，弛担持刀。狼不敢前，眈眈相向。少时，一狼径去，其一犬坐于前。久之，目似瞑，意暇甚。屠暴起，以刀劈狼首，又数刀毙之。方欲行，转视积薪后，一狼洞其中，意将隧入以攻其后也。身已半入，止露尻尾。屠自后断其股，亦毙之。乃悟前狼假寐，盖以诱敌。狼亦黠矣，而顷刻两毙，禽兽之变诈几何哉？止增笑耳。",
vocab:[{w:"缀",d:"紧跟"},{w:"窘",d:"困窘，处境困难"},{w:"敌",d:"攻击"},{w:"苫蔽",d:"覆盖遮蔽"},{w:"弛",d:"放下"},{w:"眈眈",d:"注视的样子"},{w:"径去",d:"径直走开"},{w:"犬坐",d:"像狗一样蹲坐"},{w:"瞑",d:"闭眼"},{w:"暴",d:"突然"},{w:"洞",d:"打洞（名词作动词）"},{w:"隧",d:"从通道进入"},{w:"尻",d:"屁股"},{w:"股",d:"大腿"},{w:"假寐",d:"假装睡觉"},{w:"黠",d:"狡猾"}],

{id:"u6t1",unit:6,type:"prose",title:"穿井得一人",author:"《吕氏春秋》",
text:"宋之丁氏，家无井而出溉汲，常一人居外。及其家穿井，告人曰：\u201C吾穿井得一人。\u201D有闻而传之者曰：\u201C丁氏穿井得一人。\u201D国人道之，闻之于宋君。宋君令人问之于丁氏，丁氏对曰：\u201C得一人之使，非得一人于井中也。\u201D求闻之若此，不若无闻也。",

{id:"u6t2",unit:6,type:"prose",title:"杞人忧天",author:"《列子》",
text:"杞国有人忧天地崩坠，身亡所寄，废寝食者。又有忧彼之所忧者，因往晓之，曰：\u201C天，积气耳，亡处亡气。若屈伸呼吸，终日在天中行止，奈何忧崩坠乎？\u201D其人曰：\u201C天果积气，日月星宿，不当坠耶？\u201D晓之者曰：\u201C日月星宿，亦积气中之有光耀者，只使坠，亦不能有所中伤。\u201D其人曰：\u201C奈地坏乎？\u201D晓之者曰：\u201C地，积块耳，充塞四虚，亡处亡块。若躇步跐蹈，终日在地上行止，奈何忧其坏？\u201D其人舍然大喜，晓之者亦舍然大喜。",

const UNIT_NAMES={1:"第一单元·古代诗歌四首",2:"第二单元·《世说新语》二则",3:"第三单元·《论语》与课外诵读",4:"第四单元·诫子书",5:"第五单元·狼",6:"第六单元·寓言与课外诵读"};

function getProgress(){
  try{return JSON.parse(localStorage.getItem('yw_sibian_progress')||'{}')}catch(e){return{}}
}
function saveProgress(p){localStorage.setItem('yw_sibian_progress',JSON.stringify(p))}

function esc(s){return s.replace(/&/g,'\u0026amp;').replace(/</g,'\u0026lt;').replace(/>/g,'\u0026gt;').replace(/"/g,'\u0026quot;').replace(/'/g,'\u0026#39;')}
function md(s){var h=esc(s);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>');h=h.replace(/((?:<li>[\s\S]*?<\/li>\s*)+)/g,'<ul>$1</ul>');h=h.replace(/\n\n/g,'</p><p>');h=h.replace(/\n/g,'<br>');return'<p>'+h+'</p>'}

function updateStats(){
  var p=getProgress();
  var u=0,d=0,w=0,v=0;
  DATA.forEach(function(t){
    var s=p[t.id]||0;
    if(t.report){
      v++;
      if(t.report.stage3&&t.report.stage3.result==='pass')s=Math.max(s,3);
      if(t.report.stage2&&t.report.stage2.result==='pass')s=Math.max(s,2);
      if(t.report.stage1&&t.report.stage1.result==='pass')s=Math.max(s,1);
    }
    if(s>=1)u++;
    if(s>=2)d++;
    if(s>=3)w++;
  });
  document.getElementById('stat-understood').textContent=u;
  document.getElementById('stat-debated').textContent=d;
  document.getElementById('stat-written').textContent=w;
  document.getElementById('stat-verified').textContent=v;
}

function toggleCard(id){
  var card=document.getElementById('card-'+id);
  card.classList.toggle('expanded');
}

function toggleChat(id){
  var panel=document.getElementById('chat-'+id);
  panel.classList.toggle('open');
}

function setProgress(id,step){
  var p=getProgress();
  var cur=p[id]||0;
  if(cur===step){p[id]=step-1}else{p[id]=step}
  if(p[id]<0)p[id]=0;
  saveProgress(p);
  renderProgress(id);
  updateStats();
}

function renderProgress(id){
  var p=getProgress();
  var step=p[id]||0;
  ['step1','step2','step3'].forEach(function(cls,i){
    var btn=document.getElementById('btn-'+id+'-'+cls);
    if(btn){
      btn.classList.toggle('active',step>=(i+1));
    }
  });
  var dots=document.querySelectorAll('#dots-'+id+' .dot');
  dots.forEach(function(d,i){d.classList.toggle('done',step>=(i+1))});
}

function renderReport(t){
  if(!t.report) return '';
  var r=t.report;
  var html='<div class="report-box"><h4>📋 验收报告 <span style="font-size:.8em;color:var(--text-light);font-weight:400">'+esc(r.date||'')+'</span></h4>';
  
  // 三阶结果
  var stages=[
    {key:'transition',name:'反客为主',icon:'🔄'},
    {key:'stage1',name:'理解',icon:'📖'},
    {key:'stage2',name:'思辨',icon:'🔥'},
    {key:'stage3',name:'写作',icon:'✍️'}
  ];
  stages.forEach(function(st){
    if(r[st.key]){
      var s=r[st.key];
      var cls=s.result==='pass'?'pass':(s.result==='fail'?'fail':'skip');
      html+='<div class="report-row"><span class="report-label">'+st.icon+' '+st.name+'</span><span class="stage-tag '+cls+'">'+(s.result==='pass'?'✅ 通过':s.result==='fail'?'❌ 未通过':'⏭ 跳过')+'</span></div>';
    }
  });
  
  // 薄弱点
  if(r.weakPoints&&r.weakPoints.length>0){
    html+='<div style="margin-top:8px;font-size:.82em;color:var(--warning)">⚠️ 薄弱点：'+r.weakPoints.map(esc).join('、')+'</div>';
  }
  
  // 一句话
  if(r.motto){
    html+='<div class="motto-box" style="margin-top:10px">'+esc(r.motto)+'</div>';
  }
  
  // 方法收获
  if(r.method){
    html+='<div style="margin-top:10px;padding:10px 14px;background:#e8f5f1;border-radius:8px;font-size:.84em;border-left:3px solid var(--primary)"><span style="font-weight:600;color:var(--primary)">🧰 方法收获：</span>'+esc(r.method)+'</div>';
  }
  
  // 验收过程按钮
  if(r.chat){
    html+='<button class="process-btn" onclick="toggleChat(\''+t.id+'\')">💬 验收过程</button>';
    html+='<div class="chat-panel" id="chat-'+t.id+'">';
    var stageKeys=['transition','stage1','stage2','stage3'];
    var stageNames=['🔄 反客为主','📖 理解','🔥 思辨','✍️ 写作'];
    stageKeys.forEach(function(sk,si){
      var msgs=r.chat[sk];
      if(!msgs)return;
      html+='<div class="round-chat"><div class="round-chat-header">'+stageNames[si]+'</div>';
      msgs.forEach(function(m){
        var who=m.who==='ai'?'ai':'kid';
        var avatar=who==='ai'?'🤖':'👧';
        var avatarCls=who==='ai'?'ai-avatar':'kid-avatar';
        html+='<div class="chat-bubble '+who+'">';
        html+='<div class="chat-avatar '+avatarCls+'">'+avatar+'</div>';
        html+='<div class="chat-content">'+md(m.text)+'</div>';
        html+='</div>';
        if(m.eval){
          html+='<div class="chat-eval'+(m.eval.indexOf('❌')>=0?' wrong':'')+'" style="'+(who==='kid'?'text-align:right':'')+'">'+esc(m.eval)+'</div>';
        }
      });
      html+='</div>';
    });
    html+='</div>';
  } else {
    html+='<div style="margin-top:12px;padding:10px 16px;background:#f0f0f0;border-radius:8px;font-size:.82em;color:#999;text-align:center">💬 验收过程待补录（需由学习搭档对话AI导出原文）</div>';
  }
  
  html+='</div>';
  return html;
}

function render(){
  var app=document.getElementById('app');
  var p=getProgress();
  var html='';
  for(var u=1;u<=6;u++){
    var items=DATA.filter(function(t){return t.unit===u});
    html+='<div class="unit-section"><div class="unit-title">'+UNIT_NAMES[u]+'<span class="badge">'+items.length+'篇</span></div>';
    items.forEach(function(t){
      var typeLabel=t.type==='poem'?'古诗词':'文言文';
      var typeCls=t.type==='poem'?'poem':'prose';
      var step=p[t.id]||0;
      if(t.report){
        if(t.report.stage3&&t.report.stage3.result==='pass')step=Math.max(step,3);
        if(t.report.stage2&&t.report.stage2.result==='pass')step=Math.max(step,2);
        if(t.report.stage1&&t.report.stage1.result==='pass')step=Math.max(step,1);
      }
      var statusTag='';
      if(t.report){
        if(t.report.status==='pass') statusTag='<span class="status-tag pass">✅ 已验收</span>';
        else statusTag='<span class="status-tag progress">⚠️ 待复验</span>';
      }
      var vocabHtml='';
      t.vocab.forEach(function(v){
        vocabHtml+='<span class="vocab-item"><span class="word">'+esc(v.w)+'</span>＝'+esc(v.d)+'</span>';
      });
      html+='<div class="text-card" id="card-'+t.id+'">'+
        '<div class="card-header" onclick="toggleCard(\''+t.id+'\')">'+
          '<div class="card-left">'+
            '<div class="card-title">'+esc(t.title)+'</div>'+
            '<div class="card-meta">'+esc(t.author)+'</div>'+
          '</div>'+
          '<div class="card-right">'+
            '<span class="type-tag '+typeCls+'">'+typeLabel+'</span>'+
            statusTag+
            '<div class="progress-dots" id="dots-'+t.id+'">'+
              '<span class="dot'+(step>=1?' done':'')+'"></span>'+
              '<span class="dot'+(step>=2?' done':'')+'"></span>'+
              '<span class="dot'+(step>=3?' done':'')+'"></span>'+
            '</div>'+
            '<span class="expand-icon">▼</span>'+
          '</div>'+
        '</div>'+
        '<div class="card-body">'+
          '<div class="original-text">'+esc(t.text)+'</div>'+
          '<div class="vocab-section">'+
            '<h4>📖 重点字词</h4>'+
            '<div class="vocab-list">'+vocabHtml+'</div>'+
          '</div>'+
          '<div class="progress-section">'+
            '<h4>📍 学习进度</h4>'+
            '<div class="progress-btns">'+
              '<button class="p-btn step1'+(step>=1?' active':'')+'" id="btn-'+t.id+'-step1" onclick="event.stopPropagation();setProgress(\''+t.id+'\',1)">✅ 已理解</button>'+
              '<button class="p-btn step2'+(step>=2?' active':'')+'" id="btn-'+t.id+'-step2" onclick="event.stopPropagation();setProgress(\''+t.id+'\',2)">🔥 已思辨</button>'+
              '<button class="p-btn step3'+(step>=3?' active':'')+'" id="btn-'+t.id+'-step3" onclick="event.stopPropagation();setProgress(\''+t.id+'\',3)">✍️ 已写作</button>'+
            '</div>'+
          '</div>'+
          renderReport(t)+
        '</div>'+
      '</div>';
    });
    html+='</div>';
  }
  html+='<div class="footer">点击篇名展开原文与验收报告 · 学习进度自动保存在本地</div>';
  app.innerHTML=html;
  updateStats();
}

render();
</script>
